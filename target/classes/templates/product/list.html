<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Product List</h2>

    <a href="/products/add" class="btn btn-primary mb-3">Add Product</a>

    <a href="/categories" class="btn btn-success mb-3">View Categories</a>
    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Image</th>
            <th>Category</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="productTable"></tbody>

    </table>

</div>

<script>

    function loadProducts(){

    fetch("http://localhost:8081/api/products")
    .then(res=>res.json())
    .then(data=>{

    const table=document.getElementById("productTable");
    table.innerHTML="";

    data.forEach(p=>{

    table.innerHTML+=`
    <tr>
    <td>${p.id}</td>
    <td>${p.name}</td>
    <td>${p.price}</td>
    <td><img src="${p.image}" width="80"></td>
    <td>${p.category ? p.category.name : ""}</td>

    <td>
    <a href="/products/edit/${p.id}" class="btn btn-warning btn-sm">Edit</a>
    <button onclick="deleteProduct(${p.id})" class="btn btn-danger btn-sm">Delete</button>
    </td>

    </tr>
    `;

    });

    });

    }

    function deleteProduct(id){

    if(confirm("Delete this product?")){

    fetch(`http://localhost:8081/api/products/${id}`,{
    method:"DELETE"
    })
    .then(()=>loadProducts());

    }

    }

    loadProducts();

</script>

</body>
</html>
