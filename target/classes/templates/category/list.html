<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Danh sách Category</h2>

    <a href="/categories/add" class="btn btn-primary mb-3">Add Category</a>
    <a href="/products" class="btn btn-success mb-3">View Products</a>
    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th width="200">Action</th>
        </tr>
        </thead>

        <tbody id="categoryTable"></tbody>

    </table>

</div>

<script>

    function loadCategories(){

    fetch("http://localhost:8081/api/categories")
    .then(response => response.json())
    .then(data => {

    const table = document.getElementById("categoryTable");

    table.innerHTML = "";

    data.forEach(category => {

    const row = `
    <tr>
    <td>${category.id}</td>
    <td>${category.name}</td>

    <td>

    <a href="/categories/edit/${category.id}" class="btn btn-warning btn-sm">
    Edit
    </a>

    <button class="btn btn-danger btn-sm" onclick="deleteCategory(${category.id})">
    Delete
    </button>

    </td>

    </tr>
    `;

    table.innerHTML += row;

    });

    });

    }

    function deleteCategory(id){

    if(confirm("Are you sure delete this category?")){

    fetch(`http://localhost:8081/api/categories/${id}`,{
    method:"DELETE"
    })
    .then(response => response.text())
    .then(data =>{

    alert(data);

    loadCategories();

    });

    }

    }

    loadCategories();

</script>

</body>
</html>
